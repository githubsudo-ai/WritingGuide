<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Writing Voice Interview</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── Color tokens ──────────────────────────────────── */
    :root {
      --bg:        #0d1117;
      --bg2:       #111820;
      --bg3:       #161e28;
      --border:    #1e2a38;
      --border2:   #253040;
      --text1:     #cdd9e5;
      --text2:     #8b9eb0;
      --text3:     #506070;
      --text4:     #354555;
      --accent:    #e8f0f8;
      --btn-bg:    #e8f0f8;
      --btn-text:  #0d1117;
      --grain-op:  0.03;
    }
    :root.light {
      --bg:        #faf8f4;
      --bg2:       #f4f0ea;
      --bg3:       #ede8e0;
      --border:    #e0d8cc;
      --border2:   #d0c8bc;
      --text1:     #1a1208;
      --text2:     #5a4e3a;
      --text3:     #8a7a64;
      --text4:     #b0a090;
      --accent:    #1a1208;
      --btn-bg:    #1a1208;
      --btn-text:  #faf8f4;
      --grain-op:  0.02;
    }

    @keyframes grain {
      0%,100% { transform: translate(0,0); }
      10% { transform: translate(-2%,-3%); }
      30% { transform: translate(3%,2%); }
      50% { transform: translate(-1%,4%); }
      70% { transform: translate(4%,-1%); }
      90% { transform: translate(-3%,1%); }
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes blink {
      0%,49% { opacity: 1; }
      50%,100% { opacity: 0; }
    }
    @keyframes popIn {
      0% { transform: scale(0.4); }
      70% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    @keyframes activePulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes ripple {
      from { transform: scale(0); opacity: 0.3; }
      to   { transform: scale(4); opacity: 0; }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg); color: var(--text1);
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 32px;
      overflow-x: hidden; transition: background 0.3s ease, color 0.3s ease;
    }

    /* Grain overlay */
    body::before {
      content: '';
      position: fixed; inset: -50%;
      width: 200%; height: 200%;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
      opacity: var(--grain-op);
      animation: grain 8s steps(2) infinite;
      pointer-events: none; z-index: 0;
    }

    /* Mode toggle */
    .mode-toggle {
      position: fixed; top: 20px; right: 20px; z-index: 100;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 100px; padding: 7px 14px;
      font-size: 12px; color: var(--text3); cursor: pointer;
      transition: all 0.2s ease; display: flex; align-items: center; gap: 6px;
    }
    .mode-toggle:hover { border-color: var(--border2); color: var(--text2); }

    .container {
      width: 100%; max-width: 640px;
      position: relative; z-index: 1;
    }

    /* ── Intro ─────────────────────────────────────────── */
    .intro {
      display: flex; flex-direction: column; align-items: center;
      text-align: center;
    }
    .intro-eyebrow {
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text4); margin-bottom: 36px;
      animation: fadeIn 1.2s ease both;
    }
    .intro h1 {
      font-size: clamp(36px, 7vw, 56px); font-weight: 600;
      letter-spacing: -0.04em; line-height: 1.1;
      color: var(--text1); margin-bottom: 20px;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }
    .intro-sub {
      font-size: 17px; color: var(--text2); line-height: 1.7;
      max-width: 420px; margin-bottom: 52px;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.25s both;
    }
    .intro-sub em { color: var(--text1); font-style: normal; }
    .name-block {
      width: 100%; max-width: 320px;
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.4s both;
    }
    .name-label {
      font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
      color: var(--text3); display: block; margin-bottom: 12px; text-align: left;
    }
    .name-input {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid var(--border); color: var(--text1);
      font-size: 22px; font-weight: 400; letter-spacing: -0.01em;
      padding: 8px 0 12px; outline: none; font-family: inherit;
      transition: border-color 0.3s ease; caret-color: var(--text1);
    }
    .name-input::placeholder { color: var(--border2); }
    .name-input:focus { border-color: var(--border2); }
    .cursor-blink {
      display: inline-block; width: 2px; height: 1.1em;
      background: var(--text1); margin-left: 3px; vertical-align: middle;
      animation: blink 1s steps(2) infinite; border-radius: 1px;
    }
    .btn-start {
      margin-top: 40px; background: var(--btn-bg); color: var(--btn-text);
      border: none; border-radius: 100px;
      padding: 16px 48px; font-size: 16px; font-weight: 600;
      cursor: pointer; letter-spacing: -0.01em;
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1);
      animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.55s both;
      box-shadow: 0 8px 0 rgba(0,0,0,0.12);
    }
    .btn-start:hover:not(:disabled) { opacity: 0.9; transform: translateY(3px); box-shadow: 0 4px 0 rgba(0,0,0,0.12); }
    .btn-start:active:not(:disabled) { transform: translateY(6px); box-shadow: 0 0 0 rgba(0,0,0,0.12); }
    .btn-start:disabled { background: var(--bg3); color: var(--text4); cursor: not-allowed; box-shadow: none; transform: none; }

    /* AI inline logos in subtitle */
    .ai-inline {
      display: inline-flex; align-items: center; gap: 4px;
      white-space: nowrap;
    }
    .ai-inline img { width: 14px; height: 14px; object-fit: contain; vertical-align: middle; border-radius: 3px; }

    /* Teaser card */
    .teaser-card {
      margin-top: 52px; width: 100%; max-width: 480px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) 0.7s both;
      text-decoration: none; display: block; cursor: pointer;
      transition: border-color 0.2s ease;
    }
    .teaser-card:hover { border-color: var(--border2); }
    .teaser-card:hover .teaser-see { color: var(--text2); }
    .teaser-inner { padding: 22px 24px; position: relative; }
    .teaser-tag {
      font-size: 10px; text-transform: uppercase; letter-spacing: 0.16em;
      color: var(--text4); margin-bottom: 14px;
    }
    .teaser-voice {
      font-size: 15px; font-weight: 500; color: var(--text2); line-height: 1.5;
      margin-bottom: 14px; font-style: italic;
    }
    .teaser-voice span { color: var(--text1); }
    .teaser-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .teaser-pill {
      font-size: 11px; color: var(--text4); border: 1px solid var(--border);
      border-radius: 100px; padding: 4px 10px;
    }
    .teaser-fade {
      height: 48px; background: linear-gradient(transparent, var(--bg2));
      margin-top: -48px; position: relative;
    }
    .teaser-footer {
      border-top: 1px solid var(--border); padding: 12px 24px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .teaser-name { font-size: 12px; color: var(--text4); }
    .teaser-see { font-size: 12px; color: var(--text3); transition: color 0.2s; }

    /* ── Question page ─────────────────────────────────── */
    .q-phase {
      font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--text4); margin-bottom: 48px;
      animation: fadeIn 0.6s ease both;
    }
    .q-phase .phase-current { color: var(--text3); }

    .question {
      font-size: clamp(22px, 4vw, 30px); font-weight: 500;
      line-height: 1.35; color: var(--text1); margin-bottom: 10px;
      letter-spacing: -0.02em;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.05s both;
    }
    .question-hint {
      font-size: 14px; color: var(--text3); margin-bottom: 36px;
      line-height: 1.6; font-style: italic;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.15s both;
    }

    /* Inputs */
    textarea {
      width: 100%; background: transparent; border: none;
      border-bottom: 1px solid var(--border); color: var(--text1);
      font-size: 17px; line-height: 1.75; padding: 12px 0 16px;
      resize: none; outline: none; font-family: inherit;
      transition: border-color 0.3s ease; caret-color: var(--text1);
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both;
      min-height: 90px;
    }
    textarea::placeholder { color: var(--border2); }
    textarea:focus { border-color: var(--border2); }
    input[type="text"] {
      background: transparent; border: none; color: var(--text1);
      font-family: inherit; outline: none;
    }

    /* Voice tip */
    .voice-tip {
      margin-top: 16px; font-size: 13px; color: var(--text3); line-height: 1.6;
      animation: fadeIn 0.7s ease 0.35s both;
      border-left: 2px solid var(--border); padding-left: 12px;
    }
    .voice-tip strong { color: var(--text2); font-weight: 500; }

    /* A/B options */
    .ab-options {
      display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px;
      animation: fadeUp 0.7s cubic-bezier(0.16,1,0.3,1) 0.2s both;
    }
    .ab-option {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 14px;
      padding: 20px 22px; cursor: pointer;
      transition: border-color 0.2s ease, background 0.2s ease, color 0.2s ease;
      font-size: 15px; line-height: 1.6; color: var(--text2);
    }
    .ab-option:hover { border-color: var(--border2); color: var(--text1); background: var(--bg3); }
    .ab-option.selected { border-color: var(--text3); color: var(--text1); background: var(--bg3); }
    .ab-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text4); margin-bottom: 10px; }

    /* Controls */
    .controls {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 40px;
      animation: fadeIn 0.7s ease 0.3s both;
    }
    .skip-link {
      font-size: 13px; color: var(--text3); cursor: pointer;
      text-underline-offset: 3px; transition: color 0.2s;
    }
    .skip-link:hover { color: var(--text2); }
    .btn-next {
      background: var(--btn-bg); color: var(--btn-text); border: none; border-radius: 100px;
      padding: 13px 32px; font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.2s cubic-bezier(0.16,1,0.3,1); letter-spacing: -0.01em;
      box-shadow: 0 6px 0 rgba(0,0,0,0.12);
    }
    .btn-next:hover:not(:disabled) { opacity: 0.9; transform: translateY(3px); box-shadow: 0 3px 0 rgba(0,0,0,0.12); }
    .btn-next:active:not(:disabled) { transform: translateY(5px); box-shadow: none; }
    .btn-next:disabled { background: var(--bg3); color: var(--text4); cursor: not-allowed; transform: none; box-shadow: none; }

    /* Dots progress */
    .dots-row {
      display: flex; gap: 5px; align-items: center; margin-bottom: 52px;
      animation: fadeIn 0.8s ease both;
    }
    .dot {
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--border); transition: background 0.4s ease, width 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .dot.done { background: var(--text3); animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both; }
    .dot.active { background: var(--text2); width: 18px; border-radius: 4px; animation: activePulse 1.8s ease-in-out infinite; }

    /* Follow-up bubble */
    .followup-bubble {
      margin-top: 28px; border-top: 1px solid var(--border);
      padding-top: 20px; display: none;
    }
    .followup-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em; color: var(--text3); margin-bottom: 10px; }
    .followup-bubble textarea { margin-top: 0; font-size: 15px; min-height: 56px; animation: none; }

    /* Final prompt screen */
    .final-screen {}
    .final-screen h1 { font-size: 32px; font-weight: 600; margin-bottom: 8px; letter-spacing: -0.02em; color: var(--text1); animation: slideDown 0.6s cubic-bezier(0.16,1,0.3,1) 0.05s both; }
    .final-screen .subtitle { font-size: 16px; color: var(--text2); margin-bottom: 36px; line-height: 1.5; animation: fadeUp 0.6s ease 0.2s both; }

    /* Hero copy block */
    .prompt-hero {
      background: var(--bg2); border: 1px solid var(--border); border-radius: 16px;
      overflow: hidden; margin-bottom: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      animation: fadeUp 0.6s ease 0.3s both;
    }
    .prompt-preview {
      padding: 20px 24px; font-size: 14px; line-height: 1.75; color: var(--text3);
      white-space: pre-wrap; font-family: 'SF Mono', 'Fira Mono', monospace;
      max-height: 110px; overflow: hidden; position: relative;
    }
    .prompt-preview::after {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 48px;
      background: linear-gradient(transparent, var(--bg2));
    }
    .prompt-preview.expanded { max-height: 420px; overflow-y: auto; }
    .prompt-preview.expanded::after { display: none; }
    .prompt-expand {
      border-top: 1px solid #1e1e1e; padding: 10px 24px;
      font-size: 12px; color: var(--text3); cursor: pointer; text-align: center;
      transition: color 0.2s; user-select: none;
    }
    .prompt-expand:hover { color: var(--text2); }

    .btn-copy-hero {
      width: 100%; background: #fff; color: #000; border: none; border-radius: 10px;
      padding: 16px; font-size: 16px; font-weight: 700; cursor: pointer;
      transition: all 0.2s; letter-spacing: -0.01em; display: flex;
      align-items: center; justify-content: center; gap: 8px;
    }
    .btn-copy-hero:hover { background: #e0e0e0; transform: translateY(-1px); }
    .btn-copy-hero:active { transform: translateY(0); }
    .copy-confirm {
      text-align: center; font-size: 14px; color: #4a9a6a;
      margin-top: 12px; display: none; min-height: 20px;
    }

    .final-divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

    .how-to { font-size: 14px; color: var(--text2); line-height: 1.9; animation: fadeIn 0.6s ease 0.5s both; }
    .how-to strong { color: var(--text1); font-weight: 500; }
    .how-to ol { padding-left: 18px; }
    .how-to ol li { margin-bottom: 4px; }

    .btn-copy-hero {
      position: relative; overflow: hidden;
    }
    .btn-copy-hero:active { transform: scale(0.98); }

    /* AI launcher buttons */
    .ai-launchers {
      display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap;
      animation: fadeUp 0.6s ease 0.45s both;
    }
    .ai-btn {
      display: flex; align-items: center; gap: 8px;
      background: var(--bg2); border: 1px solid var(--border); border-radius: 10px;
      padding: 10px 16px; cursor: pointer; text-decoration: none;
      font-size: 13px; font-weight: 500; color: var(--text2);
      transition: all 0.2s ease; flex: 1; min-width: 120px;
      justify-content: center; white-space: nowrap;
    }
    .ai-btn:hover { border-color: var(--border2); color: var(--text1); background: var(--bg3); transform: translateY(-1px); }
    .ai-btn img { width: 18px; height: 18px; flex-shrink: 0; object-fit: contain; display: block; }

    /* Artifact section */
    .artifact-section {
      margin-top: 32px; border: 1px solid #1e1e1e; border-radius: 14px;
      padding: 22px 24px; animation: fadeIn 0.6s ease 0.7s both;
    }
    .artifact-eyebrow {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.15em;
      color: var(--text4); margin-bottom: 8px;
    }
    .artifact-heading {
      font-size: 15px; font-weight: 500; color: var(--text2); margin-bottom: 6px;
    }
    .artifact-sub {
      font-size: 13px; color: var(--text3); line-height: 1.6; margin-bottom: 16px;
    }
    .btn-artifact {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      padding: 10px 18px; font-size: 13px; font-weight: 500; color: var(--text3);
      cursor: pointer; text-decoration: none; transition: all 0.2s ease;
    }
    .btn-artifact:hover { border-color: var(--border2); color: var(--text1); background: var(--bg3); }
    .btn-artifact img { width: 15px; height: 15px; object-fit: contain; }

    .btn-restart {
      display: inline-block; margin-top: 20px; font-size: 13px; color: var(--text3);
      cursor: pointer; text-decoration: underline; text-underline-offset: 3px;
      transition: color 0.2s; animation: fadeIn 0.6s ease 0.6s both;
    }
    .btn-restart:hover { color: var(--text2); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>
<button class="mode-toggle" onclick="toggleMode()" id="mode-toggle">☀️ Light</button>
<div class="container" id="app"></div>
<script>
const PHASES = { 1: 'Phase 1 — Voice Discovery', 2: 'Phase 2 — Taste Calibration', 3: 'Phase 3 — Context Mapping', 4: 'Phase 4 — Writing Prompts' };

const QUESTIONS = [
  { id:1, phase:1, q:"What do you do — but explain it like you're at a dinner party, not a job interview.", hint:"Don't overthink it. Just talk.", type:"text", placeholder:"I basically..." },
  { id:2, phase:1, q:"What's something you've changed your mind about in the last few years?", hint:"Work, life, anything. How did your thinking shift?", type:"text", placeholder:"I used to think..." },
  { id:3, phase:1, q:"Tell me about something you're genuinely excited about right now.", hint:"Drop the filters. What actually gets you going?", type:"text", placeholder:"Okay so..." },
  { id:4, phase:1, q:"What's something people get wrong about your field or your work — that quietly frustrates you?", hint:"Be honest. Nobody's grading you.", type:"text", placeholder:"People always assume..." },
  { id:5, phase:1, q:"How would the people who know you best describe the way you communicate?", hint:"What would they say about how you write or talk?", type:"text", placeholder:"They'd probably say..." },
  { id:6, phase:2, q:"Is there a writer or communicator whose words you genuinely admire? What do they do that you wish you did?", hint:"Author, newsletter, tweets, a colleague — anyone.", type:"text", placeholder:"The person I think of is..." },
  { id:7, phase:2, q:"What kind of writing makes you cringe or roll your eyes?", hint:"Be specific. The more honest, the better.", type:"text", placeholder:"Nothing bothers me more than..." },
  { id:8, phase:2, q:"Which of these feels more like you? Gut reaction.", hint:"Don't overthink. Which one would you rather have written?", type:"ab",
    optionA:'"We\'ve identified a strategic opportunity to enhance cross-functional alignment and drive meaningful outcomes for our stakeholders."',
    optionB:'"We found something that could make a real difference — if we get the right people in the room."' },
  { id:9, phase:2, q:"Do you prefer reading something short and punchy, or thorough and detailed?", hint:"Does your answer change depending on what you're reading?", type:"text", placeholder:"It depends, but generally..." },
  { id:10, phase:3, q:"What do you write most often? Think about the last week.", hint:"Emails, Slack, docs, social posts, reports — whatever comes to mind.", type:"text", placeholder:"Mostly I'm writing..." },
  { id:11, phase:3, q:"Who's your most common reader? Is there one person you find yourself writing for most often?", hint:"Real or imagined — a specific person changes everything.", type:"text", placeholder:"Honestly, I'm usually writing for..." },
  { id:12, phase:3, q:"When someone finishes reading something you wrote, what's the one thing you want them to feel or do?", hint:"Trust you? Take action? Feel something? Be clear?", type:"text", placeholder:"I want them to..." },
  { id:13, phase:4, q:"Explain a recent decision you made in 2-3 sentences. Could be tiny.", hint:"Short. Instinctive. Don't overthink the writing.", type:"text", placeholder:"I decided to..." },
  { id:14, phase:4, q:"Pitch me on something you care about. 4-5 sentences. Go.", hint:"Anything — a project, an idea, a product, a habit.", type:"text", placeholder:"Here's the thing..." },
  { id:15, phase:4, q:"Last one. If your writing had one flaw you'd most want to fix, what would it be?", hint:"Be honest with yourself.", type:"text", placeholder:"If I'm being real..." }
];
const TOTAL = QUESTIONS.length;

let state = {
  screen: 'intro',
  name: '',
  current: 0,
  answers: {},
  followUps: {},
  abChoice: null
};

// ── Rendering ────────────────────────────────────────────────────────────────
const app = document.getElementById('app');

function render() {
  if (state.screen === 'intro') renderIntro();
  else if (state.screen === 'name') renderNameScreen();
  else if (state.screen === 'question') renderQuestion();
  else if (state.screen === 'final') renderFinal();
}

function renderIntro() {
  app.innerHTML = `
    <div class="intro">
      <div class="intro-eyebrow">Personal Writing Guide</div>
      <h1>Teach AI to write<br>exactly like you.</h1>
      <p class="intro-sub">Answer 15 questions. Get a prompt. Paste it into
        <span class="ai-inline"><img src="icons/atlassian-rovo-icon.webp" alt="" aria-hidden="true">Rovo Chat</span>,
        <span class="ai-inline"><img src="icons/ChatGPT-Logo.svg.png" alt="" aria-hidden="true">ChatGPT</span>,
        <span class="ai-inline"><img src="icons/gemini.webp" alt="" aria-hidden="true">Gemini</span>,
        or <span class="ai-inline"><img src="icons/Claude_AI_symbol.svg" alt="" aria-hidden="true">Claude</span>
        — and it generates your <em>Personal Writing Style Guide</em>. Give it to any AI, and it writes like you.
      </p>
      <button class="btn-start" id="btn-start" onclick="goToName()" style="animation-delay:0.4s">Begin →</button>
      <a class="teaser-card" href="docs/example.html" target="_blank">
        <div class="teaser-inner">
          <div class="teaser-tag">Example output — Writing like Abhinav</div>
          <div class="teaser-voice">"<span>Warm, direct, and grounded — writes like someone explaining something important to a friend over chai: no pretense, real clarity, and a flash of humor.</span>"</div>
          <div class="teaser-pills">
            <span class="teaser-pill">Conversational</span>
            <span class="teaser-pill">Direct</span>
            <span class="teaser-pill">Low-to-medium formality</span>
            <span class="teaser-pill">Dry humor</span>
            <span class="teaser-pill">Clarity over cleverness</span>
          </div>
        </div>
        <div class="teaser-fade"></div>
        <div class="teaser-footer">
          <span class="teaser-name">Abhinav Singh &nbsp;·&nbsp; April 2026</span>
          <span class="teaser-see">See full example ↗</span>
        </div>
      </a>
    </div>`;
}

function renderNameScreen() {
  app.innerHTML = `
    <div class="intro">
      <div class="intro-eyebrow">Let's get started</div>
      <h1>What's your<br>first name?</h1>
      <div class="name-block" style="margin-top:40px;">
        <label class="name-label" for="name-input">First name</label>
        <input class="name-input" type="text" id="name-input" placeholder="e.g. Abhinav" oninput="onNameInput(this)" autocomplete="given-name" />
        <button class="btn-start" id="btn-start" onclick="startInterview()" disabled style="margin-top:36px;font-size:20px;padding:18px 56px;letter-spacing:-0.02em;">BEGIN</button>
      </div>
    </div>`;
  setTimeout(() => document.getElementById('name-input').focus(), 120);
}

function renderQuestion() {
  const q = QUESTIONS[state.current];
  const isLast = state.current === TOTAL - 1;
  const existing = state.answers[q.id] || '';
  const canGo = canProceed(q, existing, state.abChoice);

  // Build dots
  const dots = QUESTIONS.map((_, i) => {
    let cls = 'dot';
    if (i < state.current) cls += ' done';
    else if (i === state.current) cls += ' active';
    return `<div class="${cls}"></div>`;
  }).join('');

  app.innerHTML = `
    <div class="dots-row">${dots}</div>
    <div class="q-phase"><span class="phase-current">${PHASES[q.phase]}</span></div>
    <div class="question">${q.q}</div>
    <div class="question-hint">${q.hint}</div>
    ${q.type === 'ab' ? renderAB(q) : `
      <textarea id="answer-input" placeholder="${q.placeholder}" oninput="onTextInput(this)" rows="4">${existing}</textarea>
      <div class="voice-tip">🎙️ <strong>Prefer to speak?</strong> Use Mac Dictation (Fn Fn), Wispr Flow, or similar — then paste here. Or open on your phone and use the keyboard mic.</div>
    `}
    <div class="followup-bubble" id="followup-box">
      <div class="followup-label">Go deeper</div>
      <textarea id="followup-input" placeholder="Anything to add?" rows="2" oninput="saveFollowUp(${q.id}, this.value)">${state.followUps[q.id] || ''}</textarea>
    </div>
    <div class="controls">
      <span class="skip-link" onclick="skipQuestion()">Skip</span>
      <button class="btn-next" id="btn-next" onclick="nextQuestion()" ${canGo ? '' : 'disabled'}>${isLast ? 'Finish →' : 'Next →'}</button>
    </div>`;

  const ta = document.getElementById('answer-input');
  if (ta) setTimeout(() => ta.focus(), 80);

  if (state.followUps[q.id]) {
    const box = document.getElementById('followup-box');
    if (box) box.style.display = 'block';
  }
}

function renderAB(q) {
  const a = state.abChoice;
  return `
    <div class="ab-options">
      <div class="ab-option ${a==='A'?'selected':''}" onclick="selectAB('A')">
        <div class="ab-label">Option A</div>${q.optionA}
      </div>
      <div class="ab-option ${a==='B'?'selected':''}" onclick="selectAB('B')">
        <div class="ab-label">Option B</div>${q.optionB}
      </div>
    </div>
    <textarea id="answer-input" placeholder="Why does that one feel more like you?" rows="2" oninput="onTextInput(this)">${state.answers[q.id]?.split('\n')[1] || ''}</textarea>`;
}

function renderFinal() {
  const transcript = buildTranscript();
  const fullPrompt = buildFullPrompt(transcript);

  app.innerHTML = `
    <div class="final-screen">
      <h1>You're done${state.name ? ', ' + esc(state.name) : ''} ✦</h1>
      <div class="subtitle">Copy the prompt below and paste it into any AI — Claude, ChatGPT, Gemini, whatever you use. It'll generate your Personal Writing Guide.</div>

      <div class="prompt-hero">
        <div class="prompt-preview" id="prompt-preview">${esc(fullPrompt)}</div>
        <div class="prompt-expand" id="prompt-expand" onclick="togglePromptExpand()">Show full prompt ↓</div>
      </div>

      <button class="btn-copy-hero" onclick="copyAndOpen(null)">
        <svg viewBox="0 0 24 24" style="width:18px;height:18px;fill:currentColor"><path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zm3 4H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/></svg>
        Copy prompt
      </button>
      <div class="ai-launchers">
        <a class="ai-btn" href="#" onclick="copyAndOpen('https://chat.openai.com/'); return false;">
          <img src="icons/ChatGPT-Logo.svg.png" alt="ChatGPT" />
          ChatGPT
        </a>
        <a class="ai-btn" href="#" onclick="copyAndOpen('https://claude.ai/new'); return false;">
          <img src="icons/Claude_AI_symbol.svg" alt="Claude" />
          Claude
        </a>
        <a class="ai-btn" href="#" onclick="copyAndOpen('https://gemini.google.com/app'); return false;">
          <img src="icons/gemini.webp" alt="Gemini" />
          Gemini
        </a>
        <a class="ai-btn" href="#" onclick="copyAndOpen('https://chat.rovo.com/'); return false;">
          <img src="icons/atlassian-rovo-icon.webp" alt="Rovo" />
          Rovo Chat
        </a>
      </div>
      <div class="copy-confirm" id="copy-confirm">✓ Copied — now paste it in the tab that just opened</div>

      <hr class="final-divider" />

      <div class="how-to">
        <strong>What you'll get:</strong> A clean markdown Writing Guide you can save and paste at the start of any AI conversation to make it write in your voice.
      </div>

      <div class="artifact-section">
        <div class="artifact-eyebrow">✦ Bonus — using Dia?</div>
        <div class="artifact-heading">Get a beautiful visual artifact instead</div>
        <div class="artifact-sub">Dia (and Claude) can render stunning visual documents. Use this alternate prompt to get a beautifully formatted artifact <em>plus</em> the markdown version.</div>
        <a class="btn-artifact" href="#" onclick="copyArtifactPrompt(); return false;">
          <img src="icons/dia-icon.png" alt="Dia" />
          Copy artifact prompt
        </a>
        <div class="copy-confirm" id="copy-confirm-artifact" style="margin-top:10px;">✓ Copied — paste into Dia (or Claude) for a beautiful artifact</div>
      </div>

      <span class="btn-restart" onclick="restart()">Start over</span>
    </div>`;
}

// ── Prompt builder ────────────────────────────────────────────────────────────
const SYNTHESIS_SYSTEM_PROMPT = `You are a world-class writing coach and editor. You've just conducted a deep interview with someone about their communication style, taste, and goals.

Based on their answers, produce a Personal Writing Guide in clean markdown — a concise, specific, highly personalized reference document they (or any AI) can use to write authentically in their voice.

The guide must feel like it was written *specifically* for this person — not generic advice. Use their own words and phrases wherever possible. Be honest, including about weaknesses.

Output only the markdown document below. No preamble, no commentary.

---

# [Name]'s Personal Writing Guide

## Voice in One Line
A single sentence capturing their essence as a communicator.

## Tone
- Overall feeling, energy, formality level

## Rhythm & Structure
- Sentence length tendencies, how they build to a point, use of lists vs prose

## Vocabulary
- Words/phrases that feel natural, ones to avoid, any signature expressions

## What They're Optimizing For
- What they want readers to feel or do; trust/clarity/action/warmth/authority

## Writing Contexts
For each context they mentioned, one line on how tone shifts.

## Admire & Aspire
- Who they admire and what specific qualities they're reaching toward

## What to Avoid
- Cringe-worthy patterns, known weaknesses, off-brand phrases or structures

## Growth Edge
The one thing they most want to improve, framed constructively.

## Example Rewrites
Take 1-2 short phrases or sentences from their actual interview answers and show:
- **Their words:** (quote)
- **Polished version:** (rewrite in their voice)
- **What changed:** (one line explanation)

---
*Save this as your writing system prompt. Paste it at the start of any AI conversation where you want it to write in your voice.*`;

const ARTIFACT_SYSTEM_PROMPT = `You are a world-class writing coach and editor. You've just conducted a deep interview with someone about their communication style, taste, and goals.

Based on their answers, create a Personal Writing Guide as a beautiful, visually rich artifact — the kind of document someone would want to pin, share, or keep open while writing.

Use the full formatting capabilities of your interface: headers, pull quotes, callout blocks, bold highlights, dividers, color-coded sections — make it stunning. This is the version they'll show people.

After the visual artifact, also include a plain markdown version with these sections for use as a system prompt:

# [Name]'s Personal Writing Guide
## Voice in One Line
## Tone
## Rhythm & Structure
## Vocabulary
## What They're Optimizing For
## Writing Contexts
## Admire & Aspire
## What to Avoid
## Growth Edge
## Example Rewrites

Be specific. Be honest. Make this feel earned.`;

function buildTranscript() {
  const name = state.name || 'Anonymous';
  let out = `Interview with: ${name}\n`;
  out += `Date: ${new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric' })}\n\n`;
  out += `---\n\n`;
  QUESTIONS.forEach(q => {
    out += `Q${q.id}: ${q.q}\n`;
    out += `A: ${state.answers[q.id] || '[skipped]'}\n`;
    if (state.followUps[q.id]) out += `Follow-up: ${state.followUps[q.id]}\n`;
    out += '\n';
  });
  return out.trim();
}

function buildFullPrompt(transcript) {
  return SYNTHESIS_SYSTEM_PROMPT + '\n\n---\n\nHere are the interview answers:\n\n' + transcript;
}

function buildArtifactPrompt(transcript) {
  return ARTIFACT_SYSTEM_PROMPT + '\n\n---\n\nHere are the interview answers:\n\n' + transcript;
}

// ── Event handlers ────────────────────────────────────────────────────────────
function onNameInput(el) {
  state.name = el.value.trim();
  const btn = document.getElementById('btn-start');
  if (btn) btn.disabled = state.name.length < 1;
}

function canProceed(q, text, ab) {
  if (q.type === 'ab') return ab !== null;
  return text.trim().length > 10;
}

function onTextInput(el) {
  const q = QUESTIONS[state.current];
  state.answers[q.id] = el.value;
  const btn = document.getElementById('btn-next');
  if (btn) btn.disabled = !canProceed(q, el.value, state.abChoice);
}

function selectAB(choice) {
  const q = QUESTIONS[state.current];
  state.abChoice = choice;
  const ta = document.getElementById('answer-input');
  const reason = ta ? ta.value : '';
  const optText = choice === 'A' ? q.optionA : q.optionB;
  state.answers[q.id] = `Chose Option ${choice}: ${optText}\n${reason}`;
  document.querySelectorAll('.ab-option').forEach((el, i) => {
    el.classList.toggle('selected', (i===0&&choice==='A')||(i===1&&choice==='B'));
  });
  const btn = document.getElementById('btn-next');
  if (btn) btn.disabled = false;
  if (ta) setTimeout(() => ta.focus(), 50);
}

function saveFollowUp(questionId, val) {
  state.followUps[questionId] = val;
}

function saveCurrentAnswer() {
  const q = QUESTIONS[state.current];
  const ta = document.getElementById('answer-input');
  if (ta) {
    if (q.type === 'ab' && state.abChoice) {
      const optText = state.abChoice === 'A' ? q.optionA : q.optionB;
      state.answers[q.id] = `Chose Option ${state.abChoice}: ${optText}\n${ta.value}`;
    } else {
      state.answers[q.id] = ta.value;
    }
  }
  const fta = document.getElementById('followup-input');
  if (fta && fta.value.trim()) state.followUps[q.id] = fta.value;
}

function nextQuestion() {
  saveCurrentAnswer();
  if (state.current < TOTAL - 1) {
    state.current++;
    state.abChoice = null;
    fade(() => renderQuestion());
  } else {
    state.screen = 'final';
    fade(() => renderFinal());
  }
}

function skipQuestion() {
  const q = QUESTIONS[state.current];
  state.answers[q.id] = '[skipped]';
  if (state.current < TOTAL - 1) {
    state.current++;
    state.abChoice = null;
    fade(() => renderQuestion());
  } else {
    state.screen = 'final';
    fade(() => renderFinal());
  }
}

function goToName() {
  state.screen = 'name';
  fade(() => renderNameScreen());
}

function startInterview() {
  if (!state.name) return;
  state.screen = 'question';
  fade(() => renderQuestion());
}

function restart() {
  state = { screen:'intro', name:'', current:0, answers:{}, followUps:{}, abChoice:null };
  fade(() => renderIntro());
}

function fade(fn) {
  app.style.opacity = '0';
  app.style.transition = 'opacity 0.2s';
  setTimeout(() => { fn(); app.style.opacity = '1'; }, 200);
}

// ── Copy helpers ──────────────────────────────────────────────────────────────
function togglePromptExpand() {
  const preview = document.getElementById('prompt-preview');
  const btn = document.getElementById('prompt-expand');
  if (!preview || !btn) return;
  const expanded = preview.classList.toggle('expanded');
  btn.textContent = expanded ? 'Show less ↑' : 'Show full prompt ↓';
}

function copyArtifactPrompt() {
  const transcript = buildTranscript();
  const prompt = buildArtifactPrompt(transcript);
  navigator.clipboard.writeText(prompt).then(() => {
    const el = document.getElementById('copy-confirm-artifact');
    if (el) {
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }
  });
}

function copyAndOpen(url) {
  const transcript = buildTranscript();
  const fullPrompt = buildFullPrompt(transcript);
  navigator.clipboard.writeText(fullPrompt).then(() => {
    const el = document.getElementById('copy-confirm');
    if (el) {
      el.textContent = url
        ? '✓ Copied — paste it in the tab that just opened'
        : '✓ Copied — paste it into Claude, ChatGPT, Gemini, or Rovo Chat';
      el.style.display = 'block';
      setTimeout(() => { el.style.display = 'none'; }, 3000);
    }
    if (url) window.open(url, '_blank');
  });
}

// ── Escape HTML ───────────────────────────────────────────────────────────────
function esc(str) {
  return (str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Mode toggle ───────────────────────────────────────────────────────────────
function toggleMode() {
  const isLight = document.documentElement.classList.toggle('light');
  const btn = document.getElementById('mode-toggle');
  if (btn) btn.textContent = isLight ? '🌙 Dark' : '☀️ Light';
  localStorage.setItem('mode', isLight ? 'light' : 'dark');
}

// Restore saved mode
if (localStorage.getItem('mode') === 'light') {
  document.documentElement.classList.add('light');
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('mode-toggle');
    if (btn) btn.textContent = '🌙 Dark';
  });
}

// Init
render();
</script>
</body>
